<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satellite Link Budget & Symbol Rate Tool</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 20px; background-color: #f0f2f5; color: #333; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .section { margin-bottom: 40px; padding: 20px; border: 1px solid #eef0f2; border-radius: 8px; }
        h2 { color: #0056b3; margin-top: 0; border-bottom: 2px solid #0056b3; display: inline-block; padding-bottom: 5px; }
        .input-box { padding: 8px; }
        table, th, td {
          border: 1px solid #ddd;
          border-collapse: collapse;
          padding: 10px;
        }
        th {
          text-align: center;
          background: #f0ece3;
          color: #3e3e4b;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="section">
            <h2>Data Rate Calculator</h2>
            <label for="modulation">Select Modulation:</label>
            <select id="modulation">
                <option value="1">BPSK</option>
                <option value="2">QPSK</option>
                <option value="3">8PSK</option>
                <option value="4">16APSK</option>
            </select>
            <label for="fec">Select FEC:</label>
            <select id="fec">
                <option value="0.5">1/2</option>
                <option value="0.666">2/3</option>
                <option value="0.75">3/4</option>
                <option value="0.875">7/8</option>
            </select>
            <label for="symbolRate">Enter Symbol Rate (ksps):</label>
            <input type="number" id="symbolRate" value="1000">

            <button onClick="calculateDataRate()">Calculate</button>
            <div>
                <h3>Results</h3>
                <p>Calculated Data Rate: <span id="result">0</span> kbps</p>
            </div>
        </div>
    </div>

    <script>
        function calculateDataRate() {
            const modulation = document.getElementById("modulation").value;
            const fec = document.getElementById("fec").value;
            const symbolRate = document.getElementById("symbolRate").value;
            
            if (!symbolRate || symbolRate <= 0) {
                alert("Please enter a valid symbol rate.");
                return;
            }

            const dataRate = modulation * fec * symbolRate;
            document.getElementById("result").innerText = dataRate.toFixed(2);
        }
    </script>
</body>
</html>
