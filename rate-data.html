<html>
<head>
    <title>Data Rate</title>
</head>
<body>
    <h1>Data Rate Calculation</h1>
    <div>
        <label for="modulation">Select Modulation:</label>
        <select id="modulation">
            <option value="1">BPSK</option>
            <option value="2">QPSK</option>
            <option value="3">8PSK</option>
            <option value="4">16APSK</option>
        </select>
        <label for="fec">Select FEC:</label>
        <select id="fec">
            <option value="0.5">1/2</option>
            <option value="0.666">2/3</option>
            <option value="0.75">3/4</option>
            <option value="0.875">7/8</option>
        </select>
        <label for="symbolRate">Enter Symbol Rate (ksps):</label>
        <input type="number" id="symbolRate" value="1000">

        <button onClick="calculateDataRate()">Calculate</button>
        <div>
            <h3>Results</h3>
            <p>Calculated Data Rate: <span id="result">0</span> kbps</p>
        </div>
    </div>

<script>
    // Empirical Eb/No thresholds (dB) for modem lock derived from DVB-S2/S2X guidance.
    const lockThresholds = {
        "BPSK": { "0.5": 1.0, "0.666": 2.5, "0.75": 3.8, "0.875": 4.5 },
        "QPSK": { "0.5": 1.5, "0.666": 3.5, "0.75": 5.5, "0.875": 6.3 },
        "8PSK": { "0.5": 5.5, "0.666": 6.5, "0.75": 7.8, "0.875": 8.8 },
        "16APSK": { "0.5": 8.0, "0.666": 8.8, "0.75": 10.5, "0.875": 11.5 }
    };
    const LOCK_MARGIN_DB = 2; // Recommended additional margin for stable lock.

    function calculateAll() {
        calculateMatrix();
        calculateRolloff();
        calculateEbNo();
    }

    function calculateMatrix() {
        const rs = document.getElementById('matrixRs').value;
        const tbody = document.getElementById('matrixResults');
        const mods = [{n:"BPSK",m:1},{n:"QPSK",m:2},{n:"8PSK",m:3},{n:"16APSK",m:4}];
        const fecs = [
            { value: 0.5, label: '1/2' },
            { value: 0.666, label: '2/3' },
            { value: 0.75, label: '3/4' },
            { value: 0.875, label: '7/8' }
        ];
        
        tbody.innerHTML = "";
        mods.forEach(mod => {
            fecs.forEach(fec => {
                const rb = rs * mod.m * fec.value;
                tbody.innerHTML += `<tr><td>${mod.n}</td><td>${mod.m}</td><td>${fec.label}</td><td class="highlight">${rb.toFixed(2)}</td></tr>`;
            });
        });
    }

    function calculateRolloff() {
        const bw = parseFloat(document.getElementById('inputBw').value);
        const rs = parseFloat(document.getElementById('matrixRs').value);
        const alpha = (bw / rs) - 1;
        document.getElementById('rolloffResult').value = alpha.toFixed(3);
    }

    function calculateEbNo() {
        const cn = parseFloat(document.getElementById('inputCn').value);
        const modSelect = document.getElementById('selMod');
        const m = parseFloat(modSelect.value);
        const modName = modSelect.options[modSelect.selectedIndex].dataset.mod;
        const fec = parseFloat(document.getElementById('selFec').value);
        const cnComparison = calculateDishCnComparison(cn);
        const preJamCnDish1 = cnComparison.dish1;
        const interference = calculateInterferencePenalty();
        const preJamCnDish2 = cnComparison.dish2;
        const postJamSnrDish1 = preJamCnDish1 + interference.penalty;
        const postJamSnrDish2 = preJamCnDish2 + interference.penalty;
        const effectiveCnDish1 = preJamCnDish1 - interference.penalty;
        const effectiveCnDish2 = preJamCnDish2 - interference.penalty;
        
        // Eb/No = C/N - 10log10(m * FEC)
        const spectralEfficiency = m * fec;
        const ebnoDish1NoInterference = preJamCnDish1 - (10 * Math.log10(spectralEfficiency));
        const ebnoDish1 = effectiveCnDish1 - (10 * Math.log10(spectralEfficiency));
        const ebnoDish2NoInterference = preJamCnDish2 - (10 * Math.log10(spectralEfficiency));
        const ebnoDish2 = effectiveCnDish2 - (10 * Math.log10(spectralEfficiency));
        
        document.getElementById('ebnoResult').innerText = ebnoDish1.toFixed(2);
        document.getElementById('ebnoCompare').innerText = `Dish 2 Eb/No: ${ebnoDish2.toFixed(2)} dB`;
        document.getElementById('cnEffective').innerText = `Dish 1 Post-jam SNR: ${postJamSnrDish1.toFixed(2)} dB`;
        document.getElementById('cnEffective2').innerText = `Dish 2 Post-jam SNR: ${postJamSnrDish2.toFixed(2)} dB`;
        updateEbnoCard(
            ebnoDish1,
            ebnoDish2,
            ebnoDish1NoInterference,
            ebnoDish2NoInterference,
            modName,
            fec,
            cnComparison.enabled,
            interference.enabled,
            interference.penalty,
            preJamCnDish1
        );
    }

    function calculateDishCnComparison(dish1Cn) {
        const apertureEnabled = document.getElementById('enableAperture').checked;
        if (!apertureEnabled) {
            return { dish1: dish1Cn, dish2: dish1Cn, enabled: false };
        }

        const dish1Rx = Math.max(parseFloat(document.getElementById('dish1Rx').value) || 0, 0.1);
        const dish2Rx = Math.max(parseFloat(document.getElementById('dish2Rx').value) || 0, 0.1);
        const dish1Gain = parseFloat(document.getElementById('dish1Gain').value) || 0;
        const dish2Gain = parseFloat(document.getElementById('dish2Gain').value) || 0;

        // Input C/N is Dish 1 observed C/N. Dish 2 is derived from relative differences.
        const relativeDeltaDb = (20 * Math.log10(dish2Rx / dish1Rx)) + (dish2Gain - dish1Gain);
        return {
            dish1: dish1Cn,
            dish2: dish1Cn + relativeDeltaDb,
            enabled: true
        };
    }

    function toggleApertureMode() {
        const enabled = document.getElementById('enableAperture').checked;
        document.querySelectorAll('.aperture-only').forEach(el => {
            el.classList.toggle('enabled', enabled);
        });
        calculateEbNo();
    }

    function calculateInterferencePenalty() {
        const enabled = document.getElementById('enableInterference').checked;
        if (!enabled) {
            return { penalty: 0, enabled: false };
        }

        const penalty = Math.max(parseFloat(document.getElementById('interferenceDb').value) || 0, 0);
        return { penalty, enabled: true };
    }

    function toggleInterferenceMode() {
        const enabled = document.getElementById('enableInterference').checked;
        document.querySelectorAll('.interference-only').forEach(el => {
            el.classList.toggle('enabled', enabled);
        });
        calculateEbNo();
    }

    function updateEbnoCard(ebnoDish1, ebnoDish2, ebnoDish1NoInterference, ebnoDish2NoInterference, modName, fec, apertureEnabled, interferenceEnabled, interferencePenalty, dish1CnNoInterference) {
        const card = document.getElementById('ebnoCard');
        const statusEl = document.getElementById('lockStatus');
        const interferenceEl = document.getElementById('interferenceStatus');
        const modTable = lockThresholds[modName];
        const baseThreshold = modTable ? modTable[fec] ?? null : null;

        if (!card || baseThreshold === null) {
            card.classList.remove('locked', 'unlocked');
            statusEl.innerText = 'Lock data unavailable';
            if (interferenceEl) {
                interferenceEl.innerText = 'Interference lock point unavailable';
            }
            return;
        }

            const dataRate = modulation * fec * symbolRate;
            document.getElementById("result").innerText = dataRate.toFixed(2);
        }
    </script>
</body>
</html>
